services:
  app:
    build: .
    ports:
      - 8000:8000

  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: qwail_admin
      POSTGRES_PASSWORD: qwail_secret
      POSTGRES_DB: qwail_db
#     ports:
#       - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
